<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ainary Research Network</title>
<style>
:root{--bg:#fafaf8;--surface:#f5f4f0;--border:#e5e3dc;--text:#1a1a1a;--text2:#555e70;--muted:#8a9199;--gold:#c8aa50;--green:#1a5c2a;--red:#991b1b;--blue:#2563eb;--f:'Inter',-apple-system,sans-serif;--m:'JetBrains Mono','SF Mono',monospace}
*{margin:0;padding:0;box-sizing:border-box}body{font-family:var(--f);background:var(--bg);color:var(--text)}
.page{max-width:1200px;margin:0 auto;padding:20px 16px}
.header{text-align:center;padding:28px 0 20px;border-bottom:2px solid var(--gold);margin-bottom:20px}
.header h1{font:700 20pt var(--f);letter-spacing:-.5px}
.header .sub{font:400 8pt var(--f);color:var(--text2);margin-top:4px}
.stats{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:20px}
.stat{flex:1;min-width:80px;background:var(--surface);border:1px solid var(--border);border-radius:6px;padding:10px;text-align:center}
.stat .num{font:700 18pt var(--m);color:var(--gold)}.stat .label{font:500 6pt var(--m);color:var(--muted);text-transform:uppercase;letter-spacing:1px;margin-top:2px}
.layout{display:grid;grid-template-columns:240px 1fr;gap:16px}
@media(max-width:768px){.layout{grid-template-columns:1fr}}
/* Sidebar */
.sidebar{background:#fff;border:1px solid var(--border);border-radius:8px;padding:12px;height:fit-content;position:sticky;top:16px;max-height:calc(100vh - 32px);overflow-y:auto}
.sidebar h3{font:600 8pt var(--m);color:var(--muted);text-transform:uppercase;letter-spacing:1px;margin-bottom:10px}
.domain{margin-bottom:8px}
.domain-label{font:600 8.5pt var(--f);cursor:pointer;padding:3px 0;display:flex;align-items:center;gap:5px;user-select:none}
.domain-label:hover{color:var(--gold)}.domain-label .icon{font-size:9pt}
.domain-children{padding-left:14px;display:none}.domain.open>.domain-children{display:block}
.tl{font:400 7.5pt var(--f);color:var(--text2);padding:2px 0;cursor:pointer;display:flex;justify-content:space-between;align-items:center;border-radius:3px;padding:2px 4px}
.tl:hover{background:var(--surface);color:var(--text)}.tl.active{background:rgba(200,170,80,.12);color:var(--text);font-weight:600}
.tl .ct{font:400 6.5pt var(--m);color:var(--muted)}.tl.gap{color:var(--red)}.tl.gap .gp{font:700 5pt var(--m);color:var(--red);background:rgba(153,27,27,.06);padding:1px 3px;border-radius:2px;margin-left:2px}
.tl.rich .ri{display:inline-block;width:5px;height:5px;border-radius:50%;background:var(--green);margin-left:3px}
.sub-t{padding-left:10px}.sub-t .tl{font-size:7pt}
/* Main */
.main{min-height:400px}
/* Dossier card */
.dossier{background:#fff;border:1px solid var(--border);border-radius:8px;overflow:hidden}
.dos-header{padding:20px;border-bottom:1px solid var(--border);background:linear-gradient(135deg,#fff 0%,rgba(200,170,80,.04) 100%)}
.dos-title{font:600 14pt var(--f);margin-bottom:4px}
.dos-meta{font:400 7.5pt var(--m);color:var(--muted)}
.dos-conf{display:inline-flex;align-items:center;gap:6px;margin-top:8px}
.conf-ring{width:40px;height:40px;border-radius:50%;display:flex;align-items:center;justify-content:center;font:700 10pt var(--m)}
.conf-label{font:400 7pt var(--f);color:var(--text2)}
/* Sections */
.dos-section{padding:16px 20px;border-bottom:1px solid var(--border)}
.dos-section:last-child{border-bottom:none}
.dos-section h4{font:600 8pt var(--m);color:var(--muted);text-transform:uppercase;letter-spacing:1px;margin-bottom:10px}
/* Claims */
.claim{padding:8px 0;border-top:1px solid var(--surface)}.claim:first-child{border-top:none}
.claim-text{font:400 8pt var(--f);line-height:1.5}
.claim-meta{font:400 6.5pt var(--m);color:var(--muted);margin-top:2px}
.eija{display:inline-block;font:700 5.5pt var(--m);padding:1px 4px;border-radius:2px;margin-right:2px}
.eija-E{background:#e8f5e9;color:var(--green)}.eija-I{background:#e3f2fd;color:var(--blue)}.eija-J{background:#fff3e0;color:#e65100}.eija-A{background:#fce4ec;color:var(--red)}
.so-what{font:italic 7pt var(--f);color:var(--text2);margin-top:2px}
/* Insights */
.insight{padding:8px 10px;background:var(--surface);border-radius:4px;margin-bottom:6px;font:400 8pt var(--f);line-height:1.5}
.insight .type{font:700 5.5pt var(--m);color:var(--gold);margin-right:4px;text-transform:uppercase}
/* Cross-learnings */
.cross{display:inline-flex;align-items:center;gap:4px;padding:4px 8px;background:rgba(37,99,235,.06);border:1px solid rgba(37,99,235,.12);border-radius:4px;margin:3px 4px 3px 0;font:400 7pt var(--f);color:var(--blue);cursor:pointer}
.cross:hover{background:rgba(37,99,235,.12)}
.cross .num{font:700 7pt var(--m)}
/* Adjacent */
.adj{display:inline-block;padding:3px 8px;border:1px solid var(--border);border-radius:4px;margin:3px 4px 3px 0;font:400 7pt var(--f);color:var(--text2);cursor:pointer}
.adj:hover{border-color:var(--gold);color:var(--text)}
.adj.parent{border-left:3px solid var(--gold)}
.adj.child{border-left:3px solid var(--green)}
.adj.sibling{border-left:3px solid var(--blue)}
/* Open questions */
.oq{padding:6px 0;font:400 7.5pt var(--f);color:var(--red);line-height:1.5}
.oq.sub{padding-left:12px;color:var(--text2);font-style:italic}
/* Research docs */
.rdoc{padding:8px 10px;background:var(--surface);border-radius:4px;margin-bottom:6px}
.rdoc-title{font:500 8pt var(--f)}.rdoc-meta{font:400 6.5pt var(--m);color:var(--muted);margin-top:2px}
/* Gap state */
.gap-box{padding:24px;text-align:center}
.gap-box p{font:400 8.5pt var(--f);color:var(--text2);margin:8px 0}
.gap-icon{font-size:28pt;color:var(--red);opacity:.3}
.research-btn{display:inline-flex;align-items:center;gap:6px;font:600 8pt var(--m);color:#fff;background:var(--gold);border:none;border-radius:4px;padding:8px 16px;cursor:pointer;margin-top:8px}
.research-btn:hover{background:#b8982a}
/* Projects bar */
.projects-bar{margin-bottom:16px;background:#fff;border:1px solid var(--border);border-radius:8px;padding:12px 16px}
.projects-bar h3{font:600 8pt var(--m);color:var(--muted);text-transform:uppercase;letter-spacing:1px;margin-bottom:8px}
.proj{display:inline-flex;align-items:center;gap:6px;padding:5px 10px;border:1px solid var(--border);border-radius:4px;margin:3px 4px 3px 0;font:500 7.5pt var(--f);cursor:pointer;transition:all .15s}
.proj:hover{border-color:var(--gold);background:rgba(200,170,80,.06)}
.proj.active{border-color:var(--gold);background:rgba(200,170,80,.1);font-weight:600}
.proj .dot{width:6px;height:6px;border-radius:50%}
.proj .dot.active-s{background:var(--green)}.proj .dot.paused-s{background:var(--gold)}.proj .dot.planned-s{background:var(--muted)}
.proj .links{font:400 6.5pt var(--m);color:var(--muted)}
.proj-unlinked{color:var(--red);font:400 7pt var(--f);margin-top:6px}
/* Topic project badges */
.proj-badge{display:inline-block;font:500 5.5pt var(--m);padding:1px 5px;border-radius:2px;background:rgba(200,170,80,.1);color:var(--gold);margin:1px 2px}
.footer{text-align:center;padding:20px 0;margin-top:24px;font:400 7pt var(--m);color:var(--muted)}
</style>
</head>
<body>
<div class="page">
<div class="header">
<h1>Ainary Research Network</h1>
<div class="sub">Knowledge Dossiers · Gap Detection · Compound Intelligence</div>
</div>
<div id="stats" class="stats"></div>
<div class="layout">
<div class="sidebar" id="sidebar"></div>
<div class="main" id="main"><p style="color:var(--muted);padding:40px;text-align:center">Loading...</p></div>
</div>
<div class="footer">Ainary Ventures · Research Ontology Network v2.0 · <span class="eija eija-E">E</span> Evidenz <span class="eija eija-I">I</span> Interpretation <span class="eija eija-J">J</span> Bewertung <span class="eija eija-A">A</span> Annahme</div>
</div>
<script>
var G,TAX,DOS,PROJ;
Promise.all([
  fetch('graph/knowledge-graph.json').then(r=>r.json()),
  fetch('taxonomy.json').then(r=>r.json()),
  fetch('graph/topic-dossiers.json').then(r=>r.json()),
  fetch('projects.json').then(r=>r.json())
]).then(function(r){G=r[0];TAX=r[1];DOS=r[2];PROJ=r[3];render()}).catch(function(e){
  document.getElementById('main').innerHTML='<p style="color:var(--red);padding:20px">Error: '+e.message+'</p>';
});

function render(){
  var claims=Object.values(G.claims||{});
  var reports=Object.values(G.reports||{});
  var dossiers=Object.values(DOS);
  var withClaims=dossiers.filter(function(d){return d.claimCount>0}).length;
  var gaps=dossiers.filter(function(d){return d.isGap}).length;

  var projects=(PROJ||{}).projects||[];

  // Stats
  document.getElementById('stats').innerHTML=[
    {n:reports.length,l:'Reports'},{n:claims.length,l:'Claims'},{n:dossiers.length,l:'Topics'},
    {n:withClaims,l:'With Data'},{n:gaps,l:'Gaps'},{n:projects.length,l:'Projects'}
  ].map(function(s){return'<div class="stat"><div class="num">'+s.n+'</div><div class="label">'+s.l+'</div></div>'}).join('');

  // Build topic→projects reverse map
  window._topicProjects={};
  projects.forEach(function(p){
    (p.topicLinks||[]).forEach(function(tid){
      if(!window._topicProjects[tid])window._topicProjects[tid]=[];
      window._topicProjects[tid].push(p);
    });
  });

  // Check for unlinked topics per project
  var projBar='<div class="projects-bar"><h3>Projects</h3>';
  projects.forEach(function(p){
    var unlinkedCount=0;
    (p.topicLinks||[]).forEach(function(tid){var d=DOS[tid];if(!d||d.isGap)unlinkedCount++});
    projBar+='<div class="proj" onclick="showProject(\''+p.id+'\')"><span class="dot '+p.status+'-s"></span>'+esc(p.label)+' <span class="links">'+p.topicLinks.length+' topics';
    if(unlinkedCount>0)projBar+=' · <span style="color:var(--red)">'+unlinkedCount+' gaps</span>';
    projBar+='</span></div>';
  });
  projBar+='</div>';
  document.getElementById('stats').insertAdjacentHTML('afterend',projBar);

  // Sidebar
  var html='<h3>Knowledge Map</h3>';
  (TAX.domains||[]).forEach(function(domain){
    html+='<div class="domain open"><div class="domain-label" onclick="this.parentElement.classList.toggle(\'open\')"><span class="icon">'+(domain.icon||'◉')+'</span> '+esc(domain.label)+'</div><div class="domain-children">';
    (domain.children||[]).forEach(function(topic){
      var d=DOS[topic.id];var c=d?d.claimCount:0;var isGap=!d||d.isGap;var isRich=c>=10;
      html+='<div class="tl'+(isGap?' gap':'')+(isRich?' rich':'')+'" id="tl-'+topic.id+'" onclick="show(\''+topic.id+'\')">';
      html+=esc(topic.label)+' ';
      if(isGap)html+='<span class="gp">GAP</span>';
      else{html+='<span class="ct">'+c+'</span>';if(isRich)html+='<span class="ri"></span>';}
      html+='</div>';
      if(topic.children){
        html+='<div class="sub-t">';
        topic.children.forEach(function(sub){
          var sd=DOS[sub.id];var sc=sd?sd.claimCount:0;var sg=!sd||sd.isGap;
          html+='<div class="tl'+(sg?' gap':'')+'" id="tl-'+sub.id+'" onclick="show(\''+sub.id+'\')">';
          html+=esc(sub.label)+' ';
          if(sg)html+='<span class="gp">GAP</span>';else html+='<span class="ct">'+sc+'</span>';
          html+='</div>';
        });
        html+='</div>';
      }
    });
    html+='</div></div>';
  });
  document.getElementById('sidebar').innerHTML=html;

  // Show first rich topic
  var first=dossiers.filter(function(d){return d.claimCount>0}).sort(function(a,b){return b.claimCount-a.claimCount})[0];
  if(first)show(first.id);
}

window.show=function(topicId){
  // Highlight sidebar
  document.querySelectorAll('.tl.active').forEach(function(el){el.classList.remove('active')});
  var el=document.getElementById('tl-'+topicId);if(el)el.classList.add('active');

  var d=DOS[topicId];
  if(!d){document.getElementById('main').innerHTML='<p style="padding:20px;color:var(--muted)">Topic nicht gefunden</p>';return;}

  var h='<div class="dossier">';

  // Header
  var confColor=d.confidence.score>=70?'var(--green)':d.confidence.score>=40?'var(--gold)':'var(--red)';
  h+='<div class="dos-header"><div class="dos-title">'+esc(d.label)+'</div>';
  h+='<div class="dos-meta">'+d.claimCount+' Claims · '+d.insights.length+' Insights · '+(d.researchDocs||[]).length+' Research Docs · '+d.openQuestions.length+' Open Questions';
  // Project badges
  var topicProjs=window._topicProjects[topicId]||[];
  if(topicProjs.length){topicProjs.forEach(function(p){h+=' <span class="proj-badge" onclick="showProject(\''+p.id+'\')">'+esc(p.label)+'</span>'});}
  h+='</div>';
  if(!d.isGap){
    h+='<div class="dos-conf"><div class="conf-ring" style="background:'+confColor+'15;color:'+confColor+';border:2px solid'+confColor+'">'+d.confidence.score+'</div>';
    h+='<div class="conf-label">'+esc(d.confidence.reason)+'<br>E-Rate: '+d.confidence.evidenceRatio+'% · Verified: '+d.confidence.verifiedRatio+'% · '+d.confidence.reportCount+' Reports</div></div>';
  }
  h+='</div>';

  if(d.isGap){
    // Gap state
    h+='<div class="gap-box"><div class="gap-icon">△</div><p>Keine Research-Daten zu diesem Topic</p>';
    h+='<p style="font:400 7.5pt var(--f);color:var(--muted)">Ein Research Report mit ≥30 Quellen würde dieses und angrenzende Topics anreichern.</p>';
    var adjLabels=d.adjacentTopics.filter(function(a){var ad=DOS[a.id];return ad&&!ad.isGap}).map(function(a){return a.label}).slice(0,3);
    if(adjLabels.length)h+='<p style="font:400 7pt var(--f);color:var(--text2)">Angrenzende Topics mit Daten: '+adjLabels.join(', ')+'</p>';
    h+='<button class="research-btn" onclick="triggerResearch(\''+topicId+'\',\''+esc(d.label)+'\')">◉ Research starten: '+esc(d.label)+'</button>';
    h+='</div>';
  } else {
    // ═══ INSIGHTS ═══
    if(d.insights.length){
      h+='<div class="dos-section"><h4>Insights</h4>';
      d.insights.forEach(function(ins){
        h+='<div class="insight"><span class="type">'+ins.type+'</span>'+esc(ins.text)+'</div>';
      });
      h+='</div>';
    }

    // ═══ CROSS-LEARNINGS ═══
    if(d.crossLearnings.length){
      h+='<div class="dos-section"><h4>Cross-Learnings</h4>';
      d.crossLearnings.forEach(function(cl){
        h+='<div class="cross" onclick="show(\''+cl.topicId+'\')"><span class="num">'+cl.sharedClaims+'</span> '+esc(cl.text)+'</div>';
      });
      h+='</div>';
    }

    // ═══ ADJACENT TOPICS ═══
    if(d.adjacentTopics.length){
      h+='<div class="dos-section"><h4>Angrenzende Topics</h4>';
      d.adjacentTopics.forEach(function(adj){
        h+='<span class="adj '+adj.relation+'" onclick="show(\''+adj.id+'\')">'+esc(adj.label)+'</span>';
      });
      h+='</div>';
    }

    // ═══ CLAIMS ═══
    h+='<div class="dos-section"><h4>Claims ('+d.claims.length+')</h4>';
    d.claims.slice(0,20).forEach(function(c){
      var confColor=c.confidence>=80?'var(--green)':c.confidence>=60?'var(--gold)':'var(--red)';
      h+='<div class="claim"><div class="claim-text"><span class="eija eija-'+c.eija+'">'+c.eija+'</span> '+esc(c.claim)+'</div>';
      var ts=c.trustScore||{};var srcHtml='';
      (c.realSources||[]).forEach(function(s){
        if(s.url)srcHtml+=' <a href="'+s.url+'" target="_blank" style="color:var(--blue);font:400 6.5pt var(--m);text-decoration:none" title="'+esc(s.admiralty)+'">'+esc(s.label.substring(0,35))+'</a>';
        else srcHtml+=' <span style="font:400 6.5pt var(--m);color:var(--muted)">'+esc(s.label.substring(0,35))+'</span>';
      });
      var relScore=c.relevance&&c.relevance[topicId]?c.relevance[topicId]:'-';
      h+='<div class="claim-meta">Trust '+(ts.score||c.confidence)+'%'+(ts.sourceCount>1?' ('+ts.sourceCount+' src, +'+ts.sourceBoost+')':'')+' · Relevance '+relScore+'/10 · '+c.status+(srcHtml?' ·'+srcHtml:'')+'</div>';
      if(c.soWhat)h+='<div class="so-what">'+esc(c.soWhat)+'</div>';
      h+='</div>';
    });
    if(d.claims.length>20)h+='<div style="font:400 7pt var(--m);color:var(--muted);padding:8px 0">... und '+(d.claims.length-20)+' weitere</div>';
    h+='</div>';

    // ═══ OPEN QUESTIONS ═══
    if(d.openQuestions.length){
      h+='<div class="dos-section"><h4>Open Questions</h4>';
      d.openQuestions.forEach(function(q){
        var isSub=q.startsWith('  →');
        h+='<div class="oq'+(isSub?' sub':'')+'">'+esc(q)+'</div>';
      });
      h+='<button class="research-btn" onclick="triggerResearch(\''+topicId+'\',\''+esc(d.label)+'\')">◉ Vertiefen: '+esc(d.label)+'</button>';
      h+='</div>';
    }

    // ═══ RESEARCH DOCUMENTS ═══
    if(d.researchDocs.length){
      h+='<div class="dos-section"><h4>Research Documents</h4>';
      d.researchDocs.forEach(function(rd){
        h+='<div class="rdoc"><div class="rdoc-title">'+esc(rd.title)+'</div>';
        h+='<div class="rdoc-meta">'+rd.date+' · '+rd.admiralty+' · '+rd.claimCount+' Claims aus diesem Report</div></div>';
      });
      h+='</div>';
    }
  }

  h+='</div>';
  document.getElementById('main').innerHTML=h;
};

window.showProject=function(projectId){
  var p=(PROJ||{}).projects.find(function(pr){return pr.id===projectId});
  if(!p)return;
  var h='<div class="dossier"><div class="dos-header"><div class="dos-title">'+esc(p.label)+'</div>';
  h+='<div class="dos-meta">'+esc(p.description)+' · Status: '+p.status+' · '+p.topicLinks.length+' linked topics</div></div>';
  h+='<div class="dos-section"><h4>Linked Topics</h4>';
  var gapTopics=[];
  (p.topicLinks||[]).forEach(function(tid){
    var d=DOS[tid];var isGap=!d||d.isGap;
    if(isGap)gapTopics.push(tid);
    var label=d?d.label:tid;var count=d?d.claimCount:0;
    h+='<span class="adj'+(isGap?' gap':'')+'" style="cursor:pointer;'+(isGap?'border-color:var(--red);color:var(--red)':'')+'" onclick="show(\''+tid+'\')">'+esc(label)+' ('+count+')'+(isGap?' △':'')+'</span>';
  });
  h+='</div>';
  if(gapTopics.length){
    h+='<div class="dos-section"><h4 style="color:var(--red)">△ '+gapTopics.length+' Knowledge Gaps</h4>';
    h+='<p style="font:400 7.5pt var(--f);color:var(--text2);margin-bottom:8px">Diese Topics haben keine Research-Daten. Das Projekt hat hier blinde Flecken.</p>';
    gapTopics.forEach(function(tid){
      var d=DOS[tid];var label=d?d.label:tid;
      h+='<div style="padding:4px 0"><span style="color:var(--red);font:400 7.5pt var(--f);cursor:pointer" onclick="show(\''+tid+'\')">△ '+esc(label)+'</span></div>';
    });
    h+='</div>';
  }
  h+='</div>';
  document.getElementById('main').innerHTML=h;
};

window.triggerResearch=function(topicId,label){
  var d=DOS[topicId];
  var adjNames=(d?d.adjacentTopics:[]).filter(function(a){return a.relation==='sibling'}).map(function(a){return a.label}).slice(0,3);
  var prompt='Research-Auftrag:\\n\\nTopic: '+label+'\\nStandard: Mind. 30 Tier-1 Quellen (A1/A2/B2)\\nOutput: JSON Report mit Claims, EIJA-Tags, Admiralty-Codes, soWhat\\n\\nAngrenzende Topics die profitieren: '+adjNames.join(', ')+'\\n\\nBefehl:\\nErstelle Research Report zu "'+label+'" → research-network/reports/rr-'+topicId.replace(/^t-/,'')+'.json → node extract-claims.js --ingest';
  navigator.clipboard.writeText(prompt).then(function(){alert('Research-Prompt kopiert!')}).catch(function(){prompt(prompt)});
};

function esc(s){return(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}
</script>
</body>
</html>
