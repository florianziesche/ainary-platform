<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ainary Research Network</title>
<style>
:root{--bg:#fafaf8;--surface:#f5f4f0;--border:#e5e3dc;--text:#1a1a1a;--text2:#555e70;--muted:#8a9199;--gold:#c8aa50;--green:#1a5c2a;--red:#991b1b;--blue:#2563eb;--f:'Inter',-apple-system,sans-serif;--m:'JetBrains Mono','SF Mono',monospace}
*{margin:0;padding:0;box-sizing:border-box}body{font-family:var(--f);background:var(--bg);color:var(--text)}
a{color:var(--blue);text-decoration:none}a:hover{text-decoration:underline}
.page{max-width:1200px;margin:0 auto;padding:20px 16px}
.header{text-align:center;padding:24px 0 16px;border-bottom:2px solid var(--gold);margin-bottom:16px}
.header h1{font:700 18pt var(--f);letter-spacing:-.5px}.header .sub{font:400 8pt var(--f);color:var(--text2);margin-top:4px}
/* Stats */
.stats{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:12px}
.stat{flex:1;min-width:70px;background:var(--surface);border:1px solid var(--border);border-radius:6px;padding:8px;text-align:center}
.stat .num{font:700 16pt var(--m);color:var(--gold)}.stat .label{font:500 6pt var(--m);color:var(--muted);text-transform:uppercase;letter-spacing:1px;margin-top:1px}
/* Projects bar */
.pbar{margin-bottom:12px;background:#fff;border:1px solid var(--border);border-radius:8px;padding:10px 14px}
.pbar h3{font:600 7pt var(--m);color:var(--muted);text-transform:uppercase;letter-spacing:1px;margin-bottom:6px}
.proj{display:inline-flex;align-items:center;gap:5px;padding:4px 8px;border:1px solid var(--border);border-radius:4px;margin:2px 3px;font:500 7pt var(--f);cursor:pointer;transition:all .15s}
.proj:hover{border-color:var(--gold);background:rgba(200,170,80,.06)}
.proj .dot{width:5px;height:5px;border-radius:50%}.proj .dot.a{background:var(--green)}.proj .dot.p{background:var(--gold)}.proj .dot.pl{background:var(--muted)}
.proj .g{color:var(--red);font:400 6pt var(--m)}
/* Sources bar */
.srcbar{margin-bottom:12px;background:#fff;border:1px solid var(--border);border-radius:8px;padding:10px 14px}
.srcbar h3{font:600 7pt var(--m);color:var(--muted);text-transform:uppercase;letter-spacing:1px;margin-bottom:6px}
.src{display:inline-flex;align-items:center;gap:5px;padding:4px 8px;border:1px solid var(--border);border-radius:4px;margin:2px 3px;font:400 7pt var(--f);cursor:pointer;transition:all .15s}
.src:hover{border-color:var(--gold);background:rgba(200,170,80,.06)}
.src .sdot{width:5px;height:5px;border-radius:50%}.src .sdot.s-active{background:var(--green)}.src .sdot.s-planned{background:var(--muted)}.src .sdot.s-paused{background:var(--gold)}
.src .stype{font:600 5pt var(--m);text-transform:uppercase;padding:1px 3px;border-radius:2px;background:var(--surface);color:var(--muted)}
.src .scount{font:400 6pt var(--m);color:var(--muted)}
/* Layout */
.layout{display:grid;grid-template-columns:220px 1fr;gap:12px}@media(max-width:768px){.layout{grid-template-columns:1fr}}
/* Sidebar */
.sb{background:#fff;border:1px solid var(--border);border-radius:8px;padding:10px;position:sticky;top:12px;max-height:calc(100vh - 24px);overflow-y:auto}
.sb h3{font:600 7pt var(--m);color:var(--muted);text-transform:uppercase;letter-spacing:1px;margin-bottom:8px}
.dom{margin-bottom:6px}.dl{font:600 8pt var(--f);cursor:pointer;padding:2px 0;display:flex;align-items:center;gap:4px;user-select:none}
.dl:hover{color:var(--gold)}.dl .ic{font-size:8pt}.dc{padding-left:12px;display:none}.dom.open>.dc{display:block}
.tl{font:400 7pt var(--f);color:var(--text2);padding:2px 4px;cursor:pointer;display:flex;justify-content:space-between;align-items:center;border-radius:3px}
.tl:hover{background:var(--surface);color:var(--text)}.tl.act{background:rgba(200,170,80,.12);color:var(--text);font-weight:600}
.tl .ct{font:400 6pt var(--m);color:var(--muted)}.tl.gap{color:var(--red)}.tl .gp{font:700 5pt var(--m);color:var(--red);background:rgba(153,27,27,.06);padding:1px 3px;border-radius:2px}
.tl .ri{display:inline-block;width:4px;height:4px;border-radius:50%;background:var(--green)}
.st{padding-left:8px}.st .tl{font-size:6.5pt}
/* Main */
.main{min-height:400px}
/* Dossier */
.dos{background:#fff;border:1px solid var(--border);border-radius:8px;overflow:hidden}
/* Summary (BLUF) */
.bluf{padding:20px;border-bottom:2px solid var(--gold);background:linear-gradient(135deg,rgba(200,170,80,.03),rgba(200,170,80,.08))}
.bluf-title{font:700 14pt var(--f);margin-bottom:4px}
.bluf-badges{margin:6px 0}.pb{display:inline-block;font:500 5.5pt var(--m);padding:1px 5px;border-radius:2px;background:rgba(200,170,80,.1);color:var(--gold);margin:1px 2px;cursor:pointer}
.bluf-metrics{display:flex;gap:16px;margin:10px 0;flex-wrap:wrap}
.bm{text-align:center}.bm .v{font:700 14pt var(--m)}.bm .l{font:400 6pt var(--m);color:var(--muted);text-transform:uppercase}
.bluf-summary{font:400 9pt var(--f);line-height:1.6;color:var(--text);margin-top:10px}
.bluf-summary li{margin-bottom:4px}
.eija-bar{display:flex;height:6px;border-radius:3px;overflow:hidden;margin-top:8px;background:var(--surface)}
.eija-bar .e{background:var(--green)}.eija-bar .i{background:var(--blue)}.eija-bar .j{background:#e65100}.eija-bar .a{background:var(--red)}
/* Sections */
.sec{padding:14px 20px;border-bottom:1px solid var(--border)}.sec:last-child{border-bottom:none}
.sec h4{font:600 7.5pt var(--m);color:var(--muted);text-transform:uppercase;letter-spacing:1px;margin-bottom:8px;display:flex;align-items:center;gap:6px}
.sec h4 .cnt{font:400 6.5pt var(--m);color:var(--text2)}
/* Playbook */
.play{padding:8px 10px;background:rgba(200,170,80,.05);border-left:3px solid var(--gold);border-radius:0 4px 4px 0;margin-bottom:6px}
.play-text{font:400 8pt var(--f);line-height:1.5}.play-from{font:italic 6.5pt var(--f);color:var(--muted);margin-top:2px}
.play-type{font:700 5.5pt var(--m);text-transform:uppercase;margin-right:4px}
.play-type.implication{color:var(--gold)}.play-type.judgment{color:#e65100}
.play-trust{font:400 6pt var(--m);color:var(--muted)}
/* Claims */
.claim{padding:8px 0;border-top:1px solid var(--surface)}.claim:first-child{border-top:none}
.claim-text{font:400 7.5pt var(--f);line-height:1.5}
.claim-meta{display:flex;flex-wrap:wrap;gap:6px;align-items:center;margin-top:3px}
.eija{display:inline-block;font:700 5.5pt var(--m);padding:1px 4px;border-radius:2px}.eija-E{background:#e8f5e9;color:var(--green)}.eija-I{background:#e3f2fd;color:var(--blue)}.eija-J{background:#fff3e0;color:#e65100}.eija-A{background:#fce4ec;color:var(--red)}
.trust-pill{font:600 6pt var(--m);padding:1px 4px;border-radius:2px}
.trust-hi{background:#e8f5e9;color:var(--green)}.trust-md{background:#fff3e0;color:#e65100}.trust-lo{background:#fce4ec;color:var(--red)}
.rel-pill{font:400 6pt var(--m);color:var(--muted);padding:1px 4px;border:1px solid var(--border);border-radius:2px}
.src-link{font:400 6pt var(--m);color:var(--blue)}
.so-what{font:italic 7pt var(--f);color:var(--text2);margin-top:2px;padding-left:8px;border-left:2px solid var(--gold)}
.cat-header{font:600 7pt var(--f);color:var(--text2);padding:10px 0 4px;display:flex;align-items:center;gap:6px}
/* Cross-learnings */
.cross{display:flex;align-items:center;gap:8px;padding:6px 10px;background:rgba(37,99,235,.04);border:1px solid rgba(37,99,235,.1);border-radius:4px;margin-bottom:4px;cursor:pointer;font:400 7pt var(--f)}
.cross:hover{background:rgba(37,99,235,.08)}.cross .num{font:700 9pt var(--m);color:var(--blue);min-width:18px}
.cross .dir{font:400 6pt var(--m);color:var(--muted)}.cross .shared{font:italic 6.5pt var(--f);color:var(--muted);margin-top:2px}
/* Adjacent */
.adj{display:inline-block;padding:3px 7px;border:1px solid var(--border);border-radius:4px;margin:2px 3px;font:400 6.5pt var(--f);color:var(--text2);cursor:pointer}
.adj:hover{border-color:var(--gold);color:var(--text)}.adj.parent{border-left:3px solid var(--gold)}.adj.child{border-left:3px solid var(--green)}.adj.sibling{border-left:3px solid var(--blue)}
/* Open questions */
.oq{padding:5px 8px;margin-bottom:4px;border-radius:4px}.oq.assumption{background:rgba(153,27,27,.04);border-left:3px solid var(--red)}.oq.disputed{background:rgba(230,81,0,.04);border-left:3px solid #e65100}.oq.weak,.oq.source-gap{background:var(--surface);border-left:3px solid var(--muted)}
.oq-text{font:400 7.5pt var(--f);line-height:1.4}.oq-trust{font:400 6pt var(--m);color:var(--muted)}
/* Research docs */
.rdoc{padding:8px 10px;background:var(--surface);border-radius:4px;margin-bottom:4px}
.rdoc-t{font:500 7.5pt var(--f)}.rdoc-m{font:400 6pt var(--m);color:var(--muted);margin-top:1px}
/* Gap state */
.gap-box{padding:30px;text-align:center}.gap-icon{font-size:28pt;color:var(--red);opacity:.25}
.gap-box p{font:400 8pt var(--f);color:var(--text2);margin:6px 0}
.rbtn{display:inline-flex;align-items:center;gap:5px;font:600 7.5pt var(--m);color:#fff;background:var(--gold);border:none;border-radius:4px;padding:7px 14px;cursor:pointer}.rbtn:hover{background:#b8982a}
/* Report Builder Modal */
.modal-bg{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.5);z-index:999;overflow-y:auto;padding:20px}
.modal-bg.open{display:flex;align-items:flex-start;justify-content:center}
.modal{background:#fff;border-radius:8px;width:100%;max-width:800px;margin:20px auto;border:2px solid var(--gold)}
.modal-header{padding:16px 20px;border-bottom:2px solid var(--gold);display:flex;justify-content:space-between;align-items:center}
.modal-header h2{font:600 12pt var(--f)}.modal-close{font:400 16pt var(--f);cursor:pointer;color:var(--muted);border:none;background:none}
.modal-body{padding:20px}
.form-section{margin-bottom:16px}
.form-section h4{font:600 8pt var(--m);color:var(--muted);text-transform:uppercase;letter-spacing:1px;margin-bottom:6px}
.form-row{display:flex;gap:8px;margin-bottom:6px;align-items:center;flex-wrap:wrap}
.finput{font:400 8pt var(--f);padding:6px 8px;border:1px solid var(--border);border-radius:4px;background:#fff;flex:1;min-width:100px}
.finput:focus{border-color:var(--gold);outline:none}
.fselect{font:400 7.5pt var(--f);padding:5px 6px;border:1px solid var(--border);border-radius:4px;background:#fff;min-width:60px}
.ftextarea{font:400 8pt var(--f);padding:6px 8px;border:1px solid var(--border);border-radius:4px;width:100%;min-height:60px;resize:vertical}
.fbtn{font:600 7pt var(--m);padding:5px 10px;border:1px solid var(--border);border-radius:4px;cursor:pointer;background:var(--surface)}
.fbtn:hover{border-color:var(--gold)}.fbtn.primary{background:var(--gold);color:#fff;border-color:var(--gold)}.fbtn.primary:hover{background:#b8982a}
.fbtn.danger{color:var(--red);border-color:var(--red)}.fbtn.danger:hover{background:rgba(153,27,27,.05)}
.source-item,.claim-item{padding:8px;background:var(--surface);border-radius:4px;margin-bottom:6px;position:relative}
.source-item .remove,.claim-item .remove{position:absolute;top:4px;right:6px;font:400 10pt var(--f);cursor:pointer;color:var(--muted)}
.source-item .remove:hover,.claim-item .remove:hover{color:var(--red)}
.preview-box{background:var(--surface);border:1px solid var(--border);border-radius:4px;padding:10px;font:400 7pt var(--m);max-height:200px;overflow-y:auto;white-space:pre-wrap}
.topic-tag{display:inline-block;padding:2px 6px;border:1px solid var(--gold);border-radius:3px;font:400 6.5pt var(--f);color:var(--gold);margin:2px;cursor:pointer}
.topic-tag.selected{background:rgba(200,170,80,.15);font-weight:600}
.footer{text-align:center;padding:16px 0;margin-top:20px;font:400 6.5pt var(--m);color:var(--muted)}
</style>
</head>
<body>
<div class="page">
<div class="header"><h1>Ainary Research Network</h1><div class="sub">Knowledge Dossiers · Gap Detection · Compound Intelligence</div></div>
<div id="stats" class="stats"></div>
<div id="pbar"></div>
<div class="layout">
<div class="sb" id="sidebar"></div>
<div class="main" id="main"><p style="color:var(--muted);padding:40px;text-align:center">Loading...</p></div>
</div>
<div class="footer">Ainary Ventures · Research Network v2.0 · <span class="eija eija-E">E</span> Evidence <span class="eija eija-I">I</span> Interpretation <span class="eija eija-J">J</span> Judgment <span class="eija eija-A">A</span> Assumption</div>
</div>
<script>
var G,TAX,DOS,PROJ,SRC,_tp={};
Promise.all([
  fetch('graph/knowledge-graph.json').then(r=>r.json()),
  fetch('taxonomy.json').then(r=>r.json()),
  fetch('graph/topic-dossiers.json').then(r=>r.json()),
  fetch('projects.json').then(r=>r.json()),
  fetch('sources.json').then(r=>r.json())
]).then(function(d){G=d[0];TAX=d[1];DOS=d[2];PROJ=d[3];SRC=d[4];init()}).catch(function(e){
  document.getElementById('main').innerHTML='<p style="color:var(--red);padding:20px">'+e.message+'</p>'});

function init(){
  var claims=Object.values(G.claims||{});
  var reports=Object.values(G.reports||{});
  var dossiers=Object.values(DOS);
  var wc=dossiers.filter(function(d){return d.claimCount>0}).length;
  var gaps=dossiers.filter(function(d){return d.isGap}).length;
  var projects=(PROJ||{}).projects||[];
  
  // Stats
  document.getElementById('stats').innerHTML=[
    {n:reports.length,l:'Reports'},{n:claims.length,l:'Claims'},{n:dossiers.length,l:'Topics'},
    {n:wc,l:'With Data'},{n:gaps,l:'Gaps'},{n:projects.length,l:'Projects'},{n:((SRC||{}).sources||[]).length,l:'Sources'}
  ].map(function(s){return'<div class="stat"><div class="num">'+s.n+'</div><div class="label">'+s.l+'</div></div>'}).join('');

  // Topic→Projects reverse map
  projects.forEach(function(p){(p.topicLinks||[]).forEach(function(tid){if(!_tp[tid])_tp[tid]=[];_tp[tid].push(p)})});

  // Projects bar
  var pb='<div class="pbar"><h3>Projects</h3>';
  projects.forEach(function(p){
    var gc=0;(p.topicLinks||[]).forEach(function(tid){var d=DOS[tid];if(!d||d.isGap)gc++});
    var sc={active:'a',paused:'p',planned:'pl'}[p.status]||'pl';
    pb+='<div class="proj" onclick="showProj(\''+p.id+'\')"><span class="dot '+sc+'"></span>'+E(p.label);
    if(gc>0)pb+=' <span class="g">'+gc+'△</span>';
    pb+='</div>';
  });
  pb+='</div>';
  
  // Sources bar
  var sources=(SRC||{}).sources||[];
  var activeS=sources.filter(function(s){return s.status==='active'}).length;
  var plannedS=sources.filter(function(s){return s.status==='planned'}).length;
  pb+='<div class="srcbar"><h3>Input Sources <span style="font-weight:400;color:var(--text2)">('+activeS+' active, '+plannedS+' planned)</span></h3>';
  sources.forEach(function(s){
    var typeColors={rss:'#2563eb','page-tracker':'#7c3aed',manual:'var(--green)','auto-ingest':'var(--gold)',vault:'#e65100'};
    pb+='<div class="src" onclick="showSrc(\''+s.id+'\')">';
    pb+='<span class="sdot s-'+s.status+'"></span>';
    pb+='<span class="stype" style="color:'+(typeColors[s.type]||'var(--muted)')+'">'+s.type+'</span>';
    pb+=E(s.label);
    if(s.itemCount>0)pb+=' <span class="scount">'+s.itemCount+'</span>';
    pb+='</div>';
  });
  pb+='</div>';
  
  document.getElementById('pbar').innerHTML=pb;

  // Sidebar
  var h='<h3>Knowledge Map</h3>';
  (TAX.domains||[]).forEach(function(dom){
    h+='<div class="dom open"><div class="dl" onclick="this.parentElement.classList.toggle(\'open\')"><span class="ic">'+(dom.icon||'◉')+'</span> '+E(dom.label)+'</div><div class="dc">';
    (dom.children||[]).forEach(function(t){
      var d=DOS[t.id],c=d?d.claimCount:0,ig=!d||d.isGap,ir=c>=10;
      h+='<div class="tl'+(ig?' gap':'')+(ir?' rich':'')+'" id="tl-'+t.id+'" onclick="show(\''+t.id+'\')">';
      h+=E(t.label)+' ';if(ig)h+='<span class="gp">GAP</span>';else{h+='<span class="ct">'+c+'</span>';if(ir)h+='<span class="ri"></span>';}
      h+='</div>';
      if(t.children){h+='<div class="st">';t.children.forEach(function(s){
        var sd=DOS[s.id],sc=sd?sd.claimCount:0,sg=!sd||sd.isGap;
        h+='<div class="tl'+(sg?' gap':'')+'" id="tl-'+s.id+'" onclick="show(\''+s.id+'\')">'+E(s.label)+' ';
        if(sg)h+='<span class="gp">GAP</span>';else h+='<span class="ct">'+sc+'</span>';h+='</div>';
      });h+='</div>';}
    });h+='</div></div>';
  });
  document.getElementById('sidebar').innerHTML=h;

  // Show best topic
  var best=dossiers.filter(function(d){return d.claimCount>0}).sort(function(a,b){return b.claimCount-a.claimCount})[0];
  if(best)show(best.id);
}

window.show=function(tid){
  document.querySelectorAll('.tl.act').forEach(function(el){el.classList.remove('act')});
  var el=document.getElementById('tl-'+tid);if(el)el.classList.add('act');
  var d=DOS[tid];if(!d){document.getElementById('main').innerHTML='<p style="padding:20px;color:var(--muted)">Not found</p>';return;}
  var h='<div class="dos">';

  if(d.isGap){
    h+=gapView(d,tid);
  } else {
    // ═══ BLUF SUMMARY ═══
    var s=d.summary,cf=d.confidence,cc=d.categorizedClaims;
    var confCol=cf.score>=70?'var(--green)':cf.score>=40?'var(--gold)':'var(--red)';
    h+='<div class="bluf"><div class="bluf-title">'+E(d.label)+'</div>';
    // Project badges
    var pjs=_tp[tid]||[];if(pjs.length){h+='<div class="bluf-badges">';pjs.forEach(function(p){h+='<span class="pb" onclick="showProj(\''+p.id+'\')">'+E(p.label)+'</span>'});h+='</div>';}
    // Metrics row
    h+='<div class="bluf-metrics">';
    h+='<div class="bm"><div class="v" style="color:'+confCol+'">'+cf.score+'%</div><div class="l">Confidence</div></div>';
    h+='<div class="bm"><div class="v">'+d.claimCount+'</div><div class="l">Claims</div></div>';
    if(s){
      h+='<div class="bm"><div class="v">'+s.uniqueSources+'</div><div class="l">Sources</div></div>';
      h+='<div class="bm"><div class="v">'+s.reportCount+'</div><div class="l">Reports</div></div>';
      h+='<div class="bm"><div class="v">'+d.crossLearnings.length+'</div><div class="l">Cross-Links</div></div>';
      h+='<div class="bm"><div class="v">'+d.openQuestions.length+'</div><div class="l">Open ?s</div></div>';
    }
    h+='</div>';
    // EIJA distribution bar
    if(s){
      var total=s.evidenceCount+s.interpretationCount+s.judgmentCount+s.assumptionCount;
      if(total>0){
        h+='<div class="eija-bar">';
        if(s.evidenceCount)h+='<div class="e" style="width:'+(s.evidenceCount/total*100)+'%"></div>';
        if(s.interpretationCount)h+='<div class="i" style="width:'+(s.interpretationCount/total*100)+'%"></div>';
        if(s.judgmentCount)h+='<div class="j" style="width:'+(s.judgmentCount/total*100)+'%"></div>';
        if(s.assumptionCount)h+='<div class="a" style="width:'+(s.assumptionCount/total*100)+'%"></div>';
        h+='</div>';
        h+='<div style="font:400 6pt var(--m);color:var(--muted);margin-top:2px">E:'+s.evidenceCount+' I:'+s.interpretationCount+' J:'+s.judgmentCount+' A:'+s.assumptionCount+'</div>';
      }
    }
    // Summary bullets
    if(s&&s.topClaims.length){
      h+='<div class="bluf-summary"><strong>Management Summary</strong><ul>';
      s.topClaims.forEach(function(c){h+='<li>'+E(c)+'</li>'});
      h+='</ul></div>';
    }
    h+='</div>';

    // ═══ PLAYBOOK ═══
    if(d.playbook.length){
      h+='<div class="sec"><h4>◉ Playbook <span class="cnt">'+d.playbook.length+' actions</span></h4>';
      d.playbook.forEach(function(p){
        h+='<div class="play"><span class="play-type '+p.type+'">'+p.type+'</span>';
        h+='<span class="play-text">'+E(p.text)+'</span>';
        if(p.from)h+='<div class="play-from">← '+E(p.from)+'</div>';
        h+='<span class="play-trust">Trust '+p.trust+'%'+(p.sourceCount>1?' · '+p.sourceCount+' sources':'')+'</span></div>';
      });
      h+='</div>';
    }

    // ═══ CROSS-LEARNINGS ═══
    if(d.crossLearnings.length){
      h+='<div class="sec"><h4>◈ Cross-Learnings <span class="cnt">'+d.crossLearnings.length+' connections</span></h4>';
      d.crossLearnings.forEach(function(cl){
        var arrow={bidirectional:'⟷','this→that':'→','that→this':'←'}[cl.direction]||'⟷';
        h+='<div class="cross" onclick="show(\''+cl.topicId+'\')">';
        h+='<span class="num">'+cl.sharedClaims+'</span>';
        h+='<div><span>'+arrow+' '+E(cl.topicId.replace(/^t-|^topic-/g,'').replace(/-/g,' '))+'</span>';
        if(cl.strengthDelta>5)h+=' <span class="dir">(Δ'+cl.strengthDelta+')</span>';
        if(cl.sharedClaimTexts&&cl.sharedClaimTexts.length){h+='<div class="shared">"'+E(cl.sharedClaimTexts[0])+'..."</div>';}
        h+='</div></div>';
      });
      h+='</div>';
    }

    // ═══ CATEGORIZED CLAIMS ═══
    h+='<div class="sec"><h4>◇ Claims <span class="cnt">'+d.claimCount+' total</span></h4>';
    var cats=[
      {key:'evidence',label:'Evidence',icon:'E',cls:'eija-E'},
      {key:'interpretation',label:'Interpretation',icon:'I',cls:'eija-I'},
      {key:'judgment',label:'Judgment',icon:'J',cls:'eija-J'},
      {key:'assumption',label:'Assumption',icon:'A',cls:'eija-A'}
    ];
    cats.forEach(function(cat){
      var items=cc[cat.key]||[];if(!items.length)return;
      h+='<div class="cat-header"><span class="eija '+cat.cls+'">'+cat.icon+'</span> '+cat.label+' ('+items.length+')</div>';
      items.slice(0,10).forEach(function(c){
        var ts=c.trustScore||{};var trustCls=ts.score>=80?'trust-hi':ts.score>=60?'trust-md':'trust-lo';
        var rel=(c.relevance||{})[tid];
        h+='<div class="claim"><div class="claim-text">'+E(c.claim)+'</div><div class="claim-meta">';
        h+='<span class="trust-pill '+trustCls+'">Trust '+ts.score+'%</span>';
        if(ts.sourceCount>1)h+='<span style="font:400 6pt var(--m);color:var(--muted)">'+ts.sourceCount+' src (+'+ts.sourceBoost+')</span>';
        if(rel)h+='<span class="rel-pill">Relevance '+rel+'/10</span>';
        h+='<span style="font:400 6pt var(--m);color:var(--muted)">'+c.status+'</span>';
        (c.realSources||[]).forEach(function(src){
          if(src.url)h+='<a class="src-link" href="'+src.url+'" target="_blank">'+E(src.label.substring(0,30))+'</a>';
          else h+='<span style="font:400 6pt var(--m);color:var(--muted)">'+E(src.label.substring(0,30))+'</span>';
        });
        h+='</div>';
        if(c.soWhat)h+='<div class="so-what">'+E(c.soWhat)+'</div>';
        h+='</div>';
      });
      if(items.length>10)h+='<div style="font:400 6.5pt var(--m);color:var(--muted);padding:4px 0">+'+(items.length-10)+' more</div>';
    });
    h+='</div>';

    // ═══ ADJACENT TOPICS ═══
    if(d.adjacentTopics.length){
      h+='<div class="sec"><h4>▣ Adjacent Topics</h4>';
      d.adjacentTopics.forEach(function(a){h+='<span class="adj '+a.relation+'" onclick="show(\''+a.id+'\')">'+E(a.label)+'</span>'});
      h+='</div>';
    }

    // ═══ OPEN QUESTIONS ═══
    if(d.openQuestions.length){
      h+='<div class="sec"><h4>△ Open Questions <span class="cnt">'+d.openQuestions.length+'</span></h4>';
      d.openQuestions.forEach(function(q){
        h+='<div class="oq '+q.type+'"><div class="oq-text">'+E(q.text)+'</div>';
        if(q.trust)h+='<div class="oq-trust">Trust '+q.trust+'%</div>';
        h+='</div>';
      });
      h+='<button class="rbtn" onclick="trigRes(\''+tid+'\',\''+E(d.label)+'\')">◉ Vertiefen</button>';
      h+='</div>';
    }

    // ═══ RESEARCH DOCUMENTS ═══
    if(d.researchDocs.length){
      h+='<div class="sec"><h4>○ Research Documents <span class="cnt">'+d.researchDocs.length+'</span></h4>';
      d.researchDocs.forEach(function(r){
        h+='<div class="rdoc"><div class="rdoc-t">'+E(r.title)+'</div><div class="rdoc-m">'+r.date+' · '+r.admiralty+' · '+r.claimCount+' claims</div></div>';
      });
      h+='</div>';
    }
  }
  h+='</div>';
  document.getElementById('main').innerHTML=h;
};

function gapView(d,tid){
  var adj=d.adjacentTopics.filter(function(a){var ad=DOS[a.id];return ad&&!ad.isGap}).map(function(a){return a.label}).slice(0,3);
  var h='<div class="bluf"><div class="bluf-title">'+E(d.label)+'</div>';

}

window.showProj=function(pid){

window.trigSrc=function(sid,label){

// ═══ REPORT BUILDER ═══
var _rb={topicId:null,topicLabel:'',sources:[],claims:[],adjacentTopics:[]};

window.trigRes=function(tid,label){
  var d=DOS[tid];
  var sug=d&&d.suggestions?d.suggestions:{sources:[],claims:[],researchQuestions:[]};
  
  // Pre-fill with suggested sources
  var prefillSources=sug.sources.map(function(s,i){return{id:'s'+(i+1),label:s.label,url:s.url||'',admiralty:s.admiralty||'B2',reason:s.reason||'',suggested:true}});
  
  // Pre-fill with suggested claims
  var prefillClaims=sug.claims.map(function(c){return{claim:c.claim,eija:c.eija||'E',admiralty:c.admiralty||'B2',sources:[],soWhat:c.soWhat||'',reason:c.reason||'',suggested:true}});
  
  _rb={topicId:tid,topicLabel:label,sources:prefillSources,claims:prefillClaims,adjacentTopics:d?d.adjacentTopics:[],researchQuestions:sug.researchQuestions||[]};
  renderReportBuilder();
  document.getElementById('report-modal').classList.add('open');
};

window.closeModal=function(){document.getElementById('report-modal').classList.remove('open')};

function renderReportBuilder(){
  var m=document.getElementById('rb-body');if(!m)return;
  var h='';
  
  // Topic info
  h+='<div class="form-section"><h4>Topic</h4>';
  h+='<div style="font:500 10pt var(--f);margin-bottom:4px">'+E(_rb.topicLabel)+'</div>';
  h+='<div style="font:400 7pt var(--f);color:var(--muted)">Report ID: rr-'+_rb.topicId.replace(/^t-/,'').replace(/^topic-/,'')+'-'+new Date().toISOString().slice(0,7)+'</div>';
  // Adjacent topics that will benefit
  if(_rb.adjacentTopics.length){
    h+='<div style="margin-top:6px;font:400 7pt var(--f);color:var(--text2)">Angrenzende Topics die profitieren:</div>';
    _rb.adjacentTopics.forEach(function(a){h+='<span class="topic-tag">'+E(a.label)+'</span>'});
  }
  h+='</div>';

  // ═══ RESEARCH QUESTIONS ═══
  if(_rb.researchQuestions&&_rb.researchQuestions.length){
    h+='<div class="form-section"><h4>Research Questions</h4>';
    _rb.researchQuestions.forEach(function(q){
      h+='<div style="font:400 7.5pt var(--f);color:var(--text2);padding:3px 0">? '+E(q)+'</div>';
    });
    h+='</div>';
  }
  
  // ═══ SOURCES ═══
  h+='<div class="form-section"><h4>Sources <span class="cnt">('+_rb.sources.length+')</span></h4>';
  if(_rb.sources.some(function(s){return s.suggested}))h+='<div style="font:400 6.5pt var(--f);color:var(--gold);margin-bottom:4px">◉ Pre-filled from adjacent topics + domain knowledge. Edit or remove as needed.</div>';
  _rb.sources.forEach(function(s,i){
    h+='<div class="source-item"><span class="remove" onclick="rmSrc('+i+')">×</span>';
    if(s.suggested)h+='<span style="font:600 5pt var(--m);color:var(--gold);float:right;margin-right:14px">SUGGESTED</span>';
    if(s.reason)h+='<div style="font:italic 6pt var(--f);color:var(--muted);margin-bottom:3px">'+E(s.reason)+'</div>';
    h+='<div class="form-row"><input class="finput" placeholder="Label (e.g. Anthropic Research Blog)" value="'+E(s.label)+'" onchange="updSrc('+i+',\'label\',this.value)">';
    h+='<select class="fselect" onchange="updSrc('+i+',\'admiralty\',this.value)">';
    ['A1','A2','B1','B2','B3','C1','C2','C3','D4','E2'].forEach(function(a){h+='<option'+(s.admiralty===a?' selected':'')+'>'+a+'</option>'});
    h+='</select></div>';
    h+='<div class="form-row"><input class="finput" placeholder="URL" value="'+E(s.url)+'" onchange="updSrc('+i+',\'url\',this.value)"></div>';
    h+='</div>';
  });
  h+='<button class="fbtn" onclick="addSrc()">+ Add Source</button>';
  h+='</div>';

  // ═══ CLAIMS ═══
  h+='<div class="form-section"><h4>Claims <span class="cnt">('+_rb.claims.length+')</span></h4>';
  _rb.claims.forEach(function(c,i){
    h+='<div class="claim-item"><span class="remove" onclick="rmClaim('+i+')">×</span>';
    if(c.suggested)h+='<span style="font:600 5pt var(--m);color:var(--gold);float:right;margin-right:14px">SUGGESTED</span>';
    if(c.reason)h+='<div style="font:italic 6pt var(--f);color:var(--muted);margin-bottom:3px">'+E(c.reason)+'</div>';
    h+='<div class="form-row"><textarea class="ftextarea" placeholder="Claim (überprüfbare Aussage)" onchange="updClaim('+i+',\'claim\',this.value)">'+E(c.claim)+'</textarea></div>';
    h+='<div class="form-row">';
    h+='<select class="fselect" onchange="updClaim('+i+',\'eija\',this.value)">';
    [{v:'E',l:'Evidence'},{v:'I',l:'Interpretation'},{v:'J',l:'Judgment'},{v:'A',l:'Assumption'}].forEach(function(o){h+='<option value="'+o.v+'"'+(c.eija===o.v?' selected':'')+'>'+o.v+' — '+o.l+'</option>'});
    h+='</select>';
    h+='<select class="fselect" onchange="updClaim('+i+',\'admiralty\',this.value)">';
    ['A1','A2','B2','B3','C2','C3'].forEach(function(a){h+='<option'+(c.admiralty===a?' selected':'')+'>'+a+'</option>'});
    h+='</select>';
    // Source checkboxes
    h+='<span style="font:400 6.5pt var(--m);color:var(--muted);margin-left:4px">Sources:</span>';
    _rb.sources.forEach(function(s,si){
      var checked=c.sources&&c.sources.indexOf('s'+(si+1))>=0;
      h+='<label style="font:400 6.5pt var(--f);cursor:pointer;display:inline-flex;align-items:center;gap:2px"><input type="checkbox"'+(checked?' checked':'')+' onchange="toggleClaimSrc('+i+','+si+')"> '+E(s.label.substring(0,15))+'</label>';
    });
    h+='</div>';
    h+='<div class="form-row"><input class="finput" placeholder="→ So What? (Warum ist das relevant?)" value="'+E(c.soWhat||'')+'" onchange="updClaim('+i+',\'soWhat\',this.value)"></div>';
    h+='</div>';
  });
  h+='<button class="fbtn" onclick="addClaim()">+ Add Claim</button>';
  h+='</div>';

  // ═══ PREVIEW + ACTIONS ═══
  h+='<div class="form-section"><h4>Report Preview</h4>';
  h+='<div class="preview-box" id="rb-preview">'+E(JSON.stringify(buildReport(),null,2))+'</div></div>';
  h+='<div class="form-row" style="justify-content:flex-end;gap:8px;flex-wrap:wrap">';
  h+='<button class="fbtn" onclick="closeModal()">Cancel</button>';
  h+='<button class="fbtn" onclick="downloadReport()">⤓ Download JSON</button>';
  h+='<button class="fbtn" onclick="copyReport()">Copy JSON</button>';
  h+='<button class="fbtn primary" onclick="executeResearch()" style="font-size:8pt;padding:7px 16px">◉ Execute Research → Mia</button>';
  h+='</div>';
  h+='<div style="font:400 6pt var(--f);color:var(--muted);text-align:right;margin-top:4px">Execute = Generiert optimalen Prompt aus Kontext + Quellen + Fragen → Clipboard → an Mia senden</div>';
  
  m.innerHTML=h;
}

window.addSrc=function(){_rb.sources.push({id:'s'+(_rb.sources.length+1),label:'',url:'',admiralty:'B2'});renderReportBuilder()};
window.rmSrc=function(i){_rb.sources.splice(i,1);renderReportBuilder()};
window.updSrc=function(i,k,v){_rb.sources[i][k]=v;document.getElementById('rb-preview').textContent=JSON.stringify(buildReport(),null,2)};

window.addClaim=function(){_rb.claims.push({claim:'',eija:'E',admiralty:'B2',sources:[],soWhat:''});renderReportBuilder()};
window.rmClaim=function(i){_rb.claims.splice(i,1);renderReportBuilder()};
window.updClaim=function(i,k,v){_rb.claims[i][k]=v;document.getElementById('rb-preview').textContent=JSON.stringify(buildReport(),null,2)};
window.toggleClaimSrc=function(ci,si){
  var sid='s'+(si+1);var c=_rb.claims[ci];if(!c.sources)c.sources=[];
  var idx=c.sources.indexOf(sid);if(idx>=0)c.sources.splice(idx,1);else c.sources.push(sid);
  document.getElementById('rb-preview').textContent=JSON.stringify(buildReport(),null,2);
};

function buildReport(){
  var id='rr-'+_rb.topicId.replace(/^t-/,'').replace(/^topic-/,'')+'-'+new Date().toISOString().slice(0,7);
  return{
    id:id,
    title:'Research Report: '+_rb.topicLabel,
    date:new Date().toISOString().slice(0,10),
    author:'Ainary Research Network',
    domain:_rb.topicId,
    admiralty:'B2',
    confidence:80,
    sourceCount:_rb.sources.length,
    status:'draft',
    topics:[_rb.topicId],
    sources:_rb.sources.map(function(s,i){return{id:'s'+(i+1),label:s.label,url:s.url,admiralty:s.admiralty}}),
    claims:_rb.claims.map(function(c,i){return{
      id:id+'-c'+(i+1),
      claim:c.claim,
      eija:c.eija,
      admiralty:c.admiralty,
      confidence:({A1:95,A2:90,B2:80,B3:70,C2:65,C3:60})[c.admiralty]||70,
      sources:c.sources||[],
      topics:[_rb.topicId],
      soWhat:c.soWhat||null,
      status:'unverified'
    }})
  };
}

// ═══ GENERATE EXECUTION PROMPT ═══
window.executeResearch=function(){
  var r=buildReport();
  var d=DOS[_rb.topicId];
  
  // Gather existing knowledge context
  var existingClaims=[];
  if(d&&d.categorizedClaims){
    var cc=d.categorizedClaims;
    ['evidence','interpretation','judgment'].forEach(function(cat){
      (cc[cat]||[]).slice(0,3).forEach(function(c){existingClaims.push('['+c.eija+'] '+c.claim.substring(0,100))});
    });
  }
  
  // Cross-learnings context
  var crossContext=[];
  if(d&&d.crossLearnings){
    d.crossLearnings.slice(0,3).forEach(function(cl){
      crossContext.push(cl.topicId.replace(/^t-|^topic-/g,'').replace(/-/g,' ')+' ('+cl.sharedClaims+' shared claims)');
    });
  }
  
  // Open questions
  var openQs=[];
  if(d&&d.openQuestions){d.openQuestions.slice(0,3).forEach(function(q){openQs.push(q.text)})}
  
  // Build the execution prompt
  var prompt='# RESEARCH AUFTRAG: '+_rb.topicLabel+'\n\n';
  
  prompt+='## KONTEXT (was wir bereits wissen)\n';
  if(existingClaims.length){
    prompt+='Existierende Claims ('+existingClaims.length+'):\n';
    existingClaims.forEach(function(c){prompt+='- '+c+'\n'});
  } else {
    prompt+='Keine existierenden Claims — Gap-Topic, Neuland.\n';
  }
  if(crossContext.length){
    prompt+='\nCross-Learnings:\n';
    crossContext.forEach(function(c){prompt+='- '+c+'\n'});
  }
  prompt+='\nAktueller Confidence Score: '+(d&&d.confidence?d.confidence.score+'% — '+d.confidence.reason:'0% — keine Daten')+'\n';
  
  prompt+='\n## FORSCHUNGSFRAGEN\n';
  (_rb.researchQuestions||[]).forEach(function(q){prompt+='- '+q+'\n'});
  
  if(openQs.length){
    prompt+='\nOffene Fragen aus existierendem Wissen:\n';
    openQs.forEach(function(q){prompt+='- '+q+'\n'});
  }
  
  prompt+='\n## VORGESCHLAGENE QUELLEN (starte hier)\n';
  _rb.sources.forEach(function(s){
    prompt+='- ['+s.admiralty+'] '+s.label;
    if(s.url)prompt+=' → '+s.url;
    if(s.reason)prompt+=' ('+s.reason+')';
    prompt+='\n';
  });
  
  if(_rb.claims.length){
    prompt+='\n## VORGESCHLAGENE CLAIMS (verifiziere/erweitere)\n';
    _rb.claims.forEach(function(c){
      prompt+='- ['+c.eija+'] '+c.claim+'\n';
      if(c.soWhat)prompt+='  → So What: '+c.soWhat+'\n';
    });
  }
  
  prompt+='\n## ANFORDERUNGEN\n';
  prompt+='1. Mind. 10 Tier-1 Quellen (A1/A2/B2). Jede URL muss erreichbar sein.\n';
  prompt+='2. Jeder Claim: EIJA-Tag + Admiralty-Code + soWhat\n';
  prompt+='3. Widersprüche zu existierendem Wissen explizit identifizieren\n';
  prompt+='4. Keine Claim ohne Quelle. Keine Quelle ohne URL.\n';
  prompt+='5. Output: JSON Report (Schema wie rr-*.json)\n';
  
  prompt+='\n## TRANSPARENZ-STANDARD (Beipackzettel)\n';
  prompt+='Am Ende des Reports:\n';
  prompt+='- STARK BELEGT: Claims mit ≥2 unabhängigen Quellen + Trust ≥85%\n';
  prompt+='- UNSICHER: Claims mit nur 1 Quelle oder Trust <70%\n';
  prompt+='- NICHT GEFUNDEN: Forschungsfragen die unbeantwortet blieben\n';
  prompt+='- WIDERSPRÜCHE: Wo widerspricht neues Wissen existierendem?\n';
  
  prompt+='\n## FOLLOW-UP\n';
  prompt+='Schlage 3-5 Follow-Up Fragen vor die sich aus der Research ergeben.\n';
  prompt+='Welche angrenzenden Topics profitieren von diesem Report?\n';
  
  prompt+='\n## OUTPUT FORMAT\n';
  prompt+='Speichere als: research-network/reports/'+r.id+'.json\n';
  prompt+='Dann: node extract-claims.js --ingest && node enrich-topics.js\n';

  navigator.clipboard.writeText(prompt).then(function(){
    // Show prompt in preview
    document.getElementById('rb-preview').textContent=prompt;
    alert('Research-Prompt kopiert! Sende ihn an Mia zur Ausführung.\n\nDer Prompt enthält:\n- '+existingClaims.length+' existierende Claims als Kontext\n- '+_rb.sources.length+' vorgeschlagene Quellen\n- '+(_rb.researchQuestions||[]).length+' Forschungsfragen\n- Transparenz-Standard (Beipackzettel)\n- Follow-Up Generierung');
  }).catch(function(){window.prompt('Copy prompt:',prompt)});
};

window.downloadReport=function(){
  var r=buildReport();
  var blob=new Blob([JSON.stringify(r,null,2)],{type:'application/json'});
  var a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download=r.id+'.json';a.click();
};

window.copyReport=function(){
  var json=JSON.stringify(buildReport(),null,2);
  navigator.clipboard.writeText(json).then(function(){alert('Report JSON copied! Save as research-network/reports/'+buildReport().id+'.json then run:\nnode extract-claims.js --ingest\nnode enrich-topics.js')}).catch(function(){window.prompt('Copy:',json)});
};

function E(s){return(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}
</script>

<div class="modal">
<div class="modal-header"><h2>◉ Research Report Builder</h2><button class="modal-close" onclick="closeModal()">×</button></div>
<div class="modal-body" id="rb-body"></div>
</div>
</div>
