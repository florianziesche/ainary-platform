<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Glashuette Deck — Visual Options</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#faf8f4;--s:#f5f2ec;--c:#fff;--t:#1a1a1a;--t2:#555;--t3:#888;--t4:#aaa;--g:#c8aa50;--bd:#e0ddd6;--f:'Inter',sans-serif;--m:'JetBrains Mono',monospace}
body{font-family:var(--f);background:var(--t);color:#fff;font-size:14px;line-height:1.5}
.layout{display:flex;min-height:100vh}
.sidebar{width:220px;background:#111;padding:24px 16px;position:fixed;top:0;left:0;bottom:0;overflow-y:auto;z-index:10}
.sidebar .logo{display:flex;align-items:center;gap:8px;font-weight:600;font-size:14px;margin-bottom:32px;color:#fff}
.sidebar .logo .dot{width:7px;height:7px;border-radius:50%;background:var(--g)}
.sidebar h2{font-size:10px;font-weight:500;letter-spacing:.12em;text-transform:uppercase;color:#666;margin-bottom:12px}
.nav-item{padding:9px 12px;border-radius:6px;cursor:pointer;font-size:12px;color:#999;margin-bottom:3px;transition:.15s}
.nav-item:hover{background:rgba(255,255,255,.05);color:#ccc}
.nav-item.active{background:rgba(200,170,80,.12);color:var(--g)}
.nav-item .n{font-family:var(--m);font-size:10px;color:#555;margin-right:8px;width:14px;display:inline-block}
.nav-item.active .n{color:var(--g)}
.nav-item .ck{float:right;color:#2d8a4e;display:none;font-size:11px}
.nav-item.done .ck{display:inline}
.main{margin-left:220px;padding:32px}
.slide-header{margin-bottom:24px}
.slide-header h1{font-size:20px;font-weight:600;color:#fff;margin-bottom:2px}
.slide-header p{font-size:12px;color:#666}
.visual-row{display:flex;gap:16px;margin-bottom:16px}
.vis-card{flex:1;background:#1a1a1a;border:2px solid #2a2a2a;border-radius:8px;overflow:hidden;cursor:pointer;transition:.2s}
.vis-card:hover{border-color:#444}
.vis-card.selected{border-color:var(--g);box-shadow:0 0 0 2px rgba(200,170,80,.2)}
.vis-label{padding:10px 14px;font-size:11px;font-weight:500;color:#999;border-bottom:1px solid #2a2a2a;display:flex;justify-content:space-between;align-items:center}
.vis-card.selected .vis-label{color:var(--g)}
.vis-tag{font-size:8px;font-family:var(--m);padding:2px 6px;border-radius:2px;background:#2a2a2a;color:#666}
.vis-card.selected .vis-tag{background:var(--g);color:#000}
.slide-frame{aspect-ratio:16/9;background:var(--bg);position:relative;overflow:hidden}
.slide-frame *{font-family:var(--f)}
/* Slide internals */
.sf{width:100%;height:100%;display:flex;flex-direction:column;justify-content:center;padding:8% 7%}
.sf .logo-chr{position:absolute;top:5%;left:5%;display:flex;align-items:center;gap:5px;font-size:9px;font-weight:600;color:var(--t)}
.sf .logo-chr .d{width:5px;height:5px;border-radius:50%;background:var(--g)}
.sf .sec-chr{position:absolute;top:5%;right:5%;font-size:5px;font-family:var(--m);color:var(--t4);letter-spacing:.12em;text-transform:uppercase}
.sf .cnt-chr{position:absolute;bottom:5%;right:5%;font-size:5px;font-family:var(--m);color:var(--t4)}
.sf .star{position:absolute;top:-15%;left:30%;width:70%;height:45%;background:radial-gradient(ellipse,rgba(200,170,80,.05),transparent 70%);pointer-events:none}
.sf .dots{position:absolute;inset:0;background-image:radial-gradient(rgba(0,0,0,.025) 1px,transparent 1px);background-size:20px 20px;pointer-events:none}
.sf .rule{width:30px;height:1.5px;background:var(--g);opacity:.5;margin:10px 0}
.sf .big{font-size:clamp(28px,6vw,52px);font-weight:600;letter-spacing:-.04em;line-height:1.05;color:var(--t)}
.sf .med{font-size:clamp(14px,2.5vw,22px);font-weight:600;letter-spacing:-.03em;line-height:1.12;color:var(--t)}
.sf .bod{font-size:clamp(8px,1.2vw,12px);color:var(--t2);line-height:1.6;max-width:75%}
.sf .src{font-size:6px;color:var(--t4);position:absolute;bottom:5%;left:7%}
.sf .lbl{font-size:clamp(5px,.7vw,7px);font-family:var(--m);color:var(--t3);letter-spacing:.1em;text-transform:uppercase}
.sf .num{font-size:clamp(16px,3vw,28px);font-weight:600;color:var(--t);line-height:1}
.sf .meta-line{position:absolute;bottom:5%;left:7%;font-size:7px;color:var(--t4)}
.feedback-area{margin:16px 0 40px}
.feedback-area textarea{width:100%;padding:10px 14px;background:#1a1a1a;border:1px solid #2a2a2a;border-radius:6px;color:#ccc;font-family:var(--f);font-size:12px;resize:vertical;min-height:48px}
.feedback-area textarea:focus{outline:none;border-color:var(--g)}
.btn-row{display:flex;gap:12px;margin-top:24px}
.btn{padding:10px 20px;border-radius:6px;font-family:var(--f);font-size:12px;font-weight:500;cursor:pointer;border:none}
.btn-gold{background:var(--g);color:#000}
.btn-gold:hover{background:#d4b45a}
.btn-ghost{background:transparent;color:#666;border:1px solid #333}
.btn-ghost:hover{border-color:#555;color:#999}
</style>
</head>
<body>
<div class="layout">
<div class="sidebar">
  <div class="logo"><span class="dot"></span> Visual Options</div>
  <h2>Slides</h2>
  <div id="nav"></div>
  <div style="margin-top:auto;padding-top:24px;border-top:1px solid #222;margin-top:32px">
    <button class="btn btn-gold" style="width:100%" onclick="exportAll()">Export Auswahl</button>
  </div>
</div>
<div class="main" id="main"></div>
</div>
<script>
var SLIDES=[
// ========== SLIDE 1: COVER ==========

var sel={},fb={},cur=0;
function init(){
  var nav=document.getElementById('nav');
  SLIDES.forEach(function(s,i){
    var d=document.createElement('div');
    d.className='nav-item'+(i===0?' active':'');
    d.id='nv'+i;
    d.innerHTML='<span class="n">'+s.id+'</span>'+s.title.split('—')[0].trim()+'<span class="ck">✓</span>';
    d.onclick=function(){show(i)};
    nav.appendChild(d);
  });
  show(0);
}
function show(i){
  cur=i;var s=SLIDES[i];
  document.querySelectorAll('.nav-item').forEach(function(n,j){n.className='nav-item'+(j===i?' active':'')+(sel[j]!==undefined?' done':'')});
  var m=document.getElementById('main');
  var h='<div class="slide-header"><h1>Slide '+s.id+': '+s.title+'</h1><p>'+s.sub+'</p></div><div class="visual-row">';
  s.visuals.forEach(function(v,vi){
    h+='<div class="vis-card'+(sel[i]===vi?' selected':'')+'" onclick="pick('+i+','+vi+')"><div class="vis-label">'+v.label+'<span class="vis-tag">'+v.tag+'</span></div><div class="slide-frame">'+v.html+'</div></div>';
  });
  h+='</div><div class="feedback-area"><textarea id="fb" placeholder="Feedback zu Slide '+s.id+'...">'+(fb[i]||'')+'</textarea></div>';
  m.innerHTML=h;
  document.getElementById('fb').addEventListener('input',function(){fb[cur]=this.value});
}
function pick(si,vi){sel[si]=vi;show(si)}
function exportAll(){
  var lines=[];
  SLIDES.forEach(function(s,i){
    if(sel[i]===undefined){lines.push('Slide '+s.id+': NICHT GEWAEHLT');return}
    lines.push('Slide '+s.id+' ('+s.title+'): '+s.visuals[sel[i]].label+(fb[i]?' | '+fb[i]:''));
  });
  navigator.clipboard.writeText(lines.join('\n')).then(function(){alert('Auswahl kopiert!')});
}
init();
</script>
